name: Linktree SES Campaign

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send Batch via SES
        run: node .github/scripts/ses-send-linktree.mjs
        env:
          AWS_SES_ACCESS_KEY_ID: ${{ secrets.AWS_SES_ACCESS_KEY_ID }}
          AWS_SES_SECRET_ACCESS_KEY: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY }}
          AWS_SES_REGION: us-west-1
          SES_BATCH_SIZE: 19000

      - name: Commit Updated State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/scripts/linktree-sent.json .github/scripts/linktree-logs.json
          git commit -m "Update Linktree campaign state [skip ci]" || echo "No changes to commit"
          git push
